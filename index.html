<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ma galerie photo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 30px 0;
      font-size: 2.5em;
    }

    .gallery {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap; /* utile si petit écran */
      padding: 20px;
    }

    .gallery img {
      width: 300px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

  <h1>Ma collection de photos</h1>

  <div class="gallery">
    <img src="images/20260627_170121.jpg" alt="Photo 1">
    <img src="images/20260627_170200.jpg" alt="Photo 2">
    <img src="images/20260627_170320.jpg" alt="Photo 3">
    <img src="images/20260627_170422.jpg" alt="Photo 4">
    <img src="images/20260627_170509.jpg" alt="Photo 5">
    <img src="images/20260627_170653.jpg" alt="Photo 6">
    <img src="images/20260627_170735.jpg" alt="Photo 7">
    <img src="images/20260627_170813.jpg" alt="Photo 8">
    <img src="images/20260627_170904.jpg" alt="Photo 9">
    <img src="images/20260627_170944.jpg" alt="Photo 10">
    <img src="images/20260627_171104.jpg" alt="Photo 11">
    <img src="images/20260627_171149.jpg" alt="Photo 12">
    <img src="images/20260627_171242.jpg" alt="Photo 13">
    
  </div>

</body>
</html>
