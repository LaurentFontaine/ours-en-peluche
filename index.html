<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Galerie</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .gallery img {
      width: 100%;
      height: 320px;
      object-fit: contain;
      border-radius: 12px;
      display: block;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>Ma collection de photos</h1>

  <div class="gallery" id="gallery"></div>

  <script>
    fetch('photos.json')
      .then(res => res.json())
      .then(images => {
        console.log("Images chargées :", images);

        const gallery = document.getElementById('gallery');

        images.forEach(name => {
          const img = document.createElement('img');
          img.src = 'images/' + name;
          gallery.appendChild(img);
        });
      })
      .catch(err => {
        console.error("Erreur chargement JSON :", err);
      });
  </script>

</body>
</html>
