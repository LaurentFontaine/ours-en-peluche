<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ma galerie photo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .gallery img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>Ma collection de photos</h1>

  <div class="gallery" id="gallery"></div>

  <script>
    fetch('photos.json')
      .then(response => response.json())
      .then(images => {
        const gallery = document.getElementById('gallery');

        images.forEach(img => {
          const image = document.createElement('img');
          image.src = 'images/' + img;
          gallery.appendChild(image);
        });
      });
  </script>

</body>
</html>
