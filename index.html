<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ours en peluche de collection à adopter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 30px 0;
      font-size: 2.5em;
    }

    .gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.gallery img {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 10px;
}

@media (max-width: 768px) {
  .gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 480px) {
  .gallery {
    grid-template-columns: 1fr;
  }
}
    
  </style>
</head>

<body>

  <h1>Ma collection de photos</h1>

  </div>

</body>
</html>
